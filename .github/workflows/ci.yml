name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: queue
          POSTGRES_PASSWORD: queue
          POSTGRES_DB: queue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U queue -d queue"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: queue-logos
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://queue:queue@localhost:5432/queue
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: queue-logos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      QR_TOKEN_SECRET: ci_qr_token_secret_32_chars_minimum_xxxx
      HOST_JWT_SECRET: ci_host_jwt_secret_32_chars_minimum_yyyy
      ADMIN_EMAILS: admin@example.com
      NEXTAUTH_SECRET: ci_nextauth_secret_16c
      NEXTAUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_test_placeholder
      E2E_BASE_URL: http://localhost:3000
      E2E_ADMIN_EMAIL: admin@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Migrate database
        run: pnpm db:migrate

      - name: Seed demo tenant
        run: pnpm seed --tenant=demo

      - name: Install Playwright browsers
        run: pnpm e2e:install

      - name: End-to-end tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14
