name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: pila-lang
            dockerfile: Dockerfile
          - image: pila-lang-api
            dockerfile: apps/api/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve image owner (lowercase)
        id: owner
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "value=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image }}:${{ steps.version.outputs.value }}
            ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deployment placeholder
        run: |
          echo "Images pushed:"
          echo "  ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/pila-lang:${GITHUB_REF_NAME}"
          echo "  ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/pila-lang-api:${GITHUB_REF_NAME}"
          echo "Production deploy is manual for v1 — see docs/RUNBOOK.md."
