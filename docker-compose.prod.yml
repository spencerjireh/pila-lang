# Production override. Combine with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Two images now: pila-lang (web) and pila-lang-api (api). Coolify+Traefik
# routes /api/v1/* to the api container and everything else to web.

services:
  app:
    image: ${PILA_LANG_IMAGE:-ghcr.io/pila-lang/pila-lang:latest}
    restart: unless-stopped
    command: ["node", "server.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:-}
      QR_TOKEN_SECRET: ${QR_TOKEN_SECRET}
      HOST_JWT_SECRET: ${HOST_JWT_SECRET}
      GUEST_JWT_SECRET: ${GUEST_JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.pila-web.rule=Host(`${PILA_DOMAIN:-pilalang.spencerjireh.com}`)
      - traefik.http.routers.pila-web.priority=1
      - traefik.http.services.pila-web.loadbalancer.server.port=3000

  api:
    image: ${PILA_LANG_API_IMAGE:-ghcr.io/pila-lang/pila-lang-api:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_BASE_URL: ${APP_BASE_URL:-${NEXTAUTH_URL}}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:-}
      QR_TOKEN_SECRET: ${QR_TOKEN_SECRET}
      HOST_JWT_SECRET: ${HOST_JWT_SECRET}
      GUEST_JWT_SECRET: ${GUEST_JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
    ports:
      - "3001:3001"
    # Coolify sends SIGTERM and waits up to stop_grace_period for the SSE
    # drain to complete before SIGKILL.
    stop_grace_period: 35s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "-", "http://localhost:3001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.pila-api.rule=Host(`${PILA_DOMAIN:-pilalang.spencerjireh.com}`) && PathPrefix(`/api/v1`)
      # Higher priority than `pila-web` so /api/v1/* wins over the catch-all.
      - traefik.http.routers.pila-api.priority=10
      - traefik.http.services.pila-api.loadbalancer.server.port=3001
