# Production override. Combine with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Expects the image ghcr.io/<owner>/pila-lang:latest to be published by the release
# workflow. Set IMAGE via the environment at up-time to pin a specific tag.

services:
  app:
    image: ${PILA_LANG_IMAGE:-ghcr.io/pila-lang/pila-lang:latest}
    restart: unless-stopped
    command: ["node", "server.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:-}
      QR_TOKEN_SECRET: ${QR_TOKEN_SECRET}
      HOST_JWT_SECRET: ${HOST_JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
