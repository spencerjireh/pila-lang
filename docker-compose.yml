services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: queue
      POSTGRES_PASSWORD: queue
      POSTGRES_DB: queue
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queue -d queue"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  # S3-compatible object storage. RustFS replaces MinIO (v1.0.0-alpha) —
  # Bitnami deprecated the free minio image and MinIO CE kept stripping
  # features. Service keeps the \"minio\" name for backward compat with
  # existing S3_ENDPOINT=http://minio:9000 refs in this file.
  minio:
    image: rustfs/rustfs:1.0.0-alpha.95
    environment:
      RUSTFS_ACCESS_KEY: minioadmin
      RUSTFS_SECRET_KEY: minioadmin
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrator:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://queue:queue@postgres:5432/queue
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm db:migrate"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://queue:queue@postgres:5432/queue
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: queue-logos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      QR_TOKEN_SECRET: ${QR_TOKEN_SECRET}
      HOST_JWT_SECRET: ${HOST_JWT_SECRET}
      GUEST_JWT_SECRET: ${GUEST_JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      APP_IOS_BUNDLE_ID: ${APP_IOS_BUNDLE_ID:-}
      APP_ANDROID_PACKAGE_NAME: ${APP_ANDROID_PACKAGE_NAME:-}
      APP_ANDROID_SHA256_FINGERPRINTS: ${APP_ANDROID_SHA256_FINGERPRINTS:-}
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      NODE_ENV: development
      PORT: 3001
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      DATABASE_URL: postgres://queue:queue@postgres:5432/queue
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: queue-logos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      QR_TOKEN_SECRET: ${QR_TOKEN_SECRET}
      HOST_JWT_SECRET: ${HOST_JWT_SECRET}
      GUEST_JWT_SECRET: ${GUEST_JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      APP_IOS_BUNDLE_ID: ${APP_IOS_BUNDLE_ID:-}
      APP_ANDROID_PACKAGE_NAME: ${APP_ANDROID_PACKAGE_NAME:-}
      APP_ANDROID_SHA256_FINGERPRINTS: ${APP_ANDROID_SHA256_FINGERPRINTS:-}
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @pila/api dev"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  minio-data:
